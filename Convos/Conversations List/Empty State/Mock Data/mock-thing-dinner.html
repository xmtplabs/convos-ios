<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dinner suggestion</title>
<style>
  :root {
    color-scheme: light dark;
    --color-primary: #000000;
    --color-secondary: #666666;
    --color-tertiary: #B2B2B2;
    --color-surface: #FFFFFF;
    --color-muted: #F5F5F5;
    --color-edge: #EBEBEB;
    --color-accent: #FC4F37;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --color-primary: #FFFFFF;
      --color-secondary: #999999;
      --color-tertiary: #4D4D4D;
      --color-surface: #262626;
      --color-muted: #333333;
      --color-edge: #333333;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--color-muted);
    color: var(--color-primary);
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    padding: 8px;
  }
  .card {
    background: var(--color-surface);
    border: 1px solid var(--color-edge);
    border-radius: 12px;
    padding: 12px 10px;
  }
  .hero {
    font-size: 34px;
    text-align: center;
    line-height: 1.2;
  }
  .eyebrow {
    margin-top: 8px;
    font-size: 7px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--color-secondary);
    text-align: center;
  }
  .eyebrow .dot { color: var(--color-accent); }
  h1 {
    margin-top: 2px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: -0.025em;
    line-height: 1.15;
    text-align: center;
  }
  .dek {
    margin-top: 3px;
    font-size: 8px;
    line-height: 1.4;
    color: var(--color-secondary);
    text-align: center;
  }
  .badges {
    margin-top: 9px;
    display: flex;
    justify-content: center;
    gap: 4px;
  }
  .badge {
    background: var(--color-muted);
    color: var(--color-secondary);
    border-radius: 9999px;
    font-size: 7px;
    font-weight: 600;
    letter-spacing: 0.04em;
    padding: 3px 7px;
    white-space: nowrap;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="hero">🌮</div>
    <p class="eyebrow"><span class="dot">●</span> Taco night</p>
    <h1>Al pastor street tacos</h1>
    <p class="dek">Pineapple salsa, charred corn tortillas, lime wedges</p>
    <div class="badges">
      <span class="badge">25 min</span>
      <span class="badge">Serves 4</span>
    </div>
  </div>
</body>
</html>
