<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Trip countdown</title>
<style>
  :root {
    color-scheme: light dark;
    --color-primary: #000000;
    --color-secondary: #666666;
    --color-tertiary: #B2B2B2;
    --color-surface: #FFFFFF;
    --color-muted: #F5F5F5;
    --color-edge: #EBEBEB;
    --color-accent: #FC4F37;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --color-primary: #FFFFFF;
      --color-secondary: #999999;
      --color-tertiary: #4D4D4D;
      --color-surface: #262626;
      --color-muted: #333333;
      --color-edge: #333333;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--color-surface);
    color: var(--color-primary);
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    /* Compact: the 160pt tile overlays its title pill along the bottom
       edge, so all content must end above that band. */
    padding: 10px 12px;
    text-align: center;
  }
  .eyebrow {
    font-size: 8px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--color-secondary);
  }
  .eyebrow .plane { color: var(--color-accent); }
  .count {
    margin-top: 2px;
    font-size: 58px;
    font-weight: 700;
    letter-spacing: -0.025em;
    line-height: 1.05;
    font-variant-numeric: tabular-nums;
  }
  .label {
    font-size: 9px;
    font-weight: 600;
    color: var(--color-secondary);
  }
  .meta {
    margin-top: 5px;
    padding-top: 5px;
    border-top: 1px solid var(--color-edge);
    font-size: 8px;
    color: var(--color-secondary);
  }
</style>
</head>
<body>
  <p class="eyebrow"><span class="plane">✈</span> Days to departure</p>
  <div class="count">3</div>
  <p class="label">Leaves Friday</p>
  <p class="meta">PHX rental · cabin check-in 4pm</p>
</body>
</html>
