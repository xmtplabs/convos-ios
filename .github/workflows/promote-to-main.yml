name: Promote to Main

on:
  workflow_run:
    workflows: ["Auto Release"]
    types: [completed]

concurrency:
  group: release-pipeline
  cancel-in-progress: false

jobs:
  promote:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Extract tag and check if production release
        id: version
        run: |
          TAG="${{ github.event.workflow_run.head_branch }}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

          if [ -z "$TAG" ]; then
            echo "::error::Could not determine release tag from workflow_run event"
            exit 1
          fi

          if [[ "$TAG" == *-* ]]; then
            echo "Prerelease detected ($TAG) — skipping promotion to main"
            echo "is_production=false" >> $GITHUB_OUTPUT
          else
            echo "Production release ($TAG) — will promote tagged commit to main"
            echo "is_production=true" >> $GITHUB_OUTPUT
          fi

      - name: Checkout repository
        if: steps.version.outputs.is_production == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve release commit from tag
        if: steps.version.outputs.is_production == 'true'
        id: resolve
        run: |
          TAG="${{ steps.version.outputs.tag }}"

          git fetch origin --tags --force

          RELEASE_SHA=$(git rev-list -n 1 "$TAG" || true)
          if [ -z "$RELEASE_SHA" ]; then
            echo "::error::Could not resolve commit for tag $TAG"
            exit 1
          fi

          echo "release_sha=$RELEASE_SHA" >> $GITHUB_OUTPUT
          echo "Resolved tag $TAG to commit $(git rev-parse --short "$RELEASE_SHA")"

      - name: Fast-forward main to release commit
        if: steps.version.outputs.is_production == 'true'
        id: promote_main
        run: |
          RELEASE_SHA="${{ steps.resolve.outputs.release_sha }}"

          git fetch origin main

          MAIN_SHA=$(git rev-parse origin/main)

          if [ "$RELEASE_SHA" = "$MAIN_SHA" ]; then
            echo "main is already at release commit, skipping"
            echo "result=up_to_date" >> $GITHUB_OUTPUT
            exit 0
          fi

          if ! git merge-base --is-ancestor origin/main "$RELEASE_SHA"; then
            echo "::error::main has diverged from release commit — cannot fast-forward. Manual intervention required."
            exit 1
          fi

          git push origin "$RELEASE_SHA":refs/heads/main
          echo "main fast-forwarded to $(git rev-parse --short "$RELEASE_SHA")"
          echo "result=promoted" >> $GITHUB_OUTPUT

      - name: Summary
        run: |
          TAG="${{ steps.version.outputs.tag }}"

          if [[ "$TAG" == *-* ]]; then
            echo "## Promotion Skipped" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Prerelease **$TAG** — no promotion to main." >> $GITHUB_STEP_SUMMARY
          else
            RESULT="${{ steps.promote_main.outputs.result }}"
            RELEASE_SHA="${{ steps.resolve.outputs.release_sha }}"
            RELEASE_SHA_SHORT=$(git rev-parse --short "$RELEASE_SHA")

            if [ "$RESULT" = "up_to_date" ]; then
              echo "## No Promotion Needed" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "main is already at release commit **$RELEASE_SHA_SHORT** for tag **$TAG**." >> $GITHUB_STEP_SUMMARY
            else
              echo "## main Promoted" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "main fast-forwarded to release commit **$RELEASE_SHA_SHORT** for tag **$TAG**." >> $GITHUB_STEP_SUMMARY
            fi
          fi
