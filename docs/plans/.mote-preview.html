<script>function htmlToMd(node) {
    if (node.nodeType === 3) return node.textContent;
    if (node.nodeType !== 1) return '';
    const tag = node.tagName;
    const children = () => Array.from(node.childNodes).map(htmlToMd).join('');
    const c = children();

    switch (tag) {
        case 'H1': return '# ' + c + '\n\n';
        case 'H2': return '## ' + c + '\n\n';
        case 'H3': return '### ' + c + '\n\n';
        case 'H4': return '#### ' + c + '\n\n';
        case 'H5': return '##### ' + c + '\n\n';
        case 'H6': return '###### ' + c + '\n\n';
        case 'P': return c + '\n\n';
        case 'STRONG': case 'B': return '**' + c + '**';
        case 'EM': case 'I': return '*' + c + '*';
        case 'DEL': case 'S': return '~~' + c + '~~';
        case 'CODE':
            if (node.parentElement && node.parentElement.tagName === 'PRE') return c;
            return '`' + c + '`';
        case 'PRE': {
            const code = node.querySelector('code');
            const lang = code ? (code.className.replace('language-', '') || '') : '';
            const text = code ? code.textContent : c;
            return '```' + lang + '\n' + text + '```\n\n';
        }
        case 'A': return '[' + c + '](' + (node.getAttribute('href') || '') + ')';
        case 'IMG': return '![' + (node.getAttribute('alt') || '') + '](' + (node.getAttribute('src') || '') + ')';
        case 'BLOCKQUOTE':
            return c.trim().split('\n').map(l => '> ' + l).join('\n') + '\n\n';
        case 'UL': return Array.from(node.children).map(li => '- ' + htmlToMd(li).trim()).join('\n') + '\n\n';
        case 'OL': return Array.from(node.children).map((li, i) => (i + 1) + '. ' + htmlToMd(li).trim()).join('\n') + '\n\n';
        case 'LI': return c;
        case 'HR': return '---\n\n';
        case 'BR': return '\n';
        case 'TABLE': {
            const rows = node.querySelectorAll('tr');
            if (rows.length === 0) return c;
            let md = '';
            rows.forEach((row, i) => {
                const cells = Array.from(row.querySelectorAll('th, td')).map(td => htmlToMd(td).trim());
                md += '| ' + cells.join(' | ') + ' |\n';
                if (i === 0) md += '| ' + cells.map(() => '---').join(' | ') + ' |\n';
            });
            return md + '\n';
        }
        case 'THEAD': case 'TBODY': case 'TR': case 'TH': case 'TD': return c;
        default: return c;
    }
}

document.addEventListener('copy', function(e) {
    const sel = window.getSelection();
    if (sel.rangeCount === 0 || sel.isCollapsed) return;

    const range = sel.getRangeAt(0);
    const fragment = range.cloneContents();
    const container = document.createElement('div');
    container.appendChild(fragment);

    const md = htmlToMd(container).trim();
    if (md) {
        e.clipboardData.setData('text/plain', md);
        e.preventDefault();
    }
});</script>
