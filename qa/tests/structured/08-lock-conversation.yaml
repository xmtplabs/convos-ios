id: "08"
name: "Lock and Unlock Conversation"
description: >
  Verify that locking a conversation prevents new members from joining,
  invites are invalidated, and unlocking restores invite generation while
  old invites remain invalid. Lock/unlock operates at the XMTP protocol
  level. The app shows a lock icon in the conversation toolbar when locked.
  CLI command: `convos conversation lock <id> --force` / `--unlock`.
tags: [conversations, lock, security, core]
depends_on: ["12"]
estimated_duration_s: 240

prerequisites:
  app_running: true
  cli_initialized: true
  screen: conversations_list

state:
  conversation_id: null

setup:
  - action: cli_create_and_app_join
    note: >
      CLI creates conversation (CLI is super admin). App joins via invite.
    save:
      conversation_id: "from CLI"

steps:
  - id: verify_pre_lock
    name: "Pre-lock state: conversation info accessible"
    actions:
      - tap: { id: "conversation-list-item-$conversation_id" }
      - wait_for_element: { id: "message-text-field", timeout: 10 }
      - tap: { id: "conversation-toolbar-button" }
      - wait_for_element: { id: "edit-info-button", timeout: 10 }
    verify:
      - element_exists: { id: "edit-info-button" }
      - element_exists: { label_contains: "Convo code" }
    criteria: pre_lock_state
    note: >
      Conversation info shows Edit info button, member count, Convo code
      with share button, and Personal preferences section.

  - id: lock_via_cli
    name: "Lock syncs to the app"
    actions:
      - cli_lock_conversation: { conversation: "$conversation_id" }
      - navigate_back: {}
      - navigate_back: {}
      - tap: { id: "conversation-list-item-$conversation_id" }
      - wait_for_element: { id: "message-text-field", timeout: 10 }
    verify:
      - element_exists: { id: "message-text-field" }
    criteria: lock_syncs_to_app
    note: >
      After CLI locks, a lock icon (🔒) may appear in the conversation
      toolbar (top right area). The conversation info page looks identical
      to unlocked state — no visible lock toggle or indicator there. The
      lock icon was observed in the conversation view toolbar during testing.
      Lock operates at XMTP protocol level: addMember permission set to deny,
      invite tag rotated (invalidates all existing invites).

  - id: unlock_via_cli
    name: "Unlock syncs to the app"
    actions:
      - cli_unlock_conversation: { conversation: "$conversation_id" }
      - navigate_back: {}
      - tap: { id: "conversation-list-item-$conversation_id" }
      - wait_for_element: { id: "message-text-field", timeout: 10 }
    verify:
      - element_exists: { id: "message-text-field" }
    criteria: unlock_syncs_to_app

teardown:
  - action: cli_explode
    args: { conversation: "$conversation_id" }
    optional: true

criteria:
  pre_lock_state:
    description: "Pre-lock state: conversation info shows Convo code and Edit info"
  lock_syncs_to_app:
    description: "Lock state syncs to the app (lock icon may appear in toolbar)"
  unlock_syncs_to_app:
    description: "Unlock state syncs to the app"
