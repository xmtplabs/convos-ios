id: "36"
name: "Agents As Contacts"
description: >
  Happy path for the agents-as-contacts refactor, driven entirely through the
  in-app agent-builder flow against the local stack (no CLI, no invite deep-links).
  The user builds an agent from a prompt ("Make a new agent"); once the backend
  provisions it (name + templateId), the verified template-backed agent shows up as
  a single contact in the Contacts browse list with an Agent pill, the contact card
  carries a "Valid - convos" attestation + a publish-and-share icon, and starting a
  chat from the card presents the "New chat, new context" confirmation. Guards
  Contact+BrowseVisibility.isVisibleInContactsList (agentVerification != nil &&
  agentTemplateId != nil), ContactsRepository canonicalContacts dedup, and the
  ContactDetailView agent affordances.
tags: [agents, contacts, verification, local-stack, agent-builder]
depends_on: []
estimated_duration_s: 360

prerequisites:
  app_running: true
  local_stack_running: true
  agent_jwks_pinned: true
  scheme: "Convos (Local)"
  bundle_id: org.convos.ios-local
  screen: home
  # The local backend must be able to provision agents: the account needs credits
  # (GET /api/v2/accounts/me/credits must not 403) and the template generator must
  # succeed (no "Generate endpoint failed: ownerAccountId does not exist"). Without
  # this the built agent never gets a templateId and stays hidden from contacts.
  backend_agent_provisioning_working: true

state:
  agent_prompt: "a friendly chess coach that teaches openings"

setup:
  - action: note
    args:
      text: >
        No CLI / no invite deep-links. Agents are created in-app via the
        agent-builder ("Make a new agent" composer -> Make). The app runs the
        "Convos (Local)" scheme against the local stack and must be authorized
        (App Check: a registered Local FIREBASE_APP_CHECK_DEBUG_TOKEN; see runbook).
        AGENT_DEBUG_JWKS is pinned so the built agent verifies as convos.

steps:
  - id: make_agent
    name: "Build an agent from a prompt via the agent-builder"
    actions:
      - tap: { label: "Continue", optional: true }
        note: "Dismiss the one-time keyboard tutorial if present."
      - tap: { id: "agent-composer-text-field" }
      - type_in_field: { id: "agent-composer-text-field", text: "$agent_prompt" }
      - tap: { id: "agent-make-button" }
      - wait_for_element: { label_contains: "You created an agent", timeout: 60 }
      - screenshot: {}
    verify:
      - element_exists: { label_contains: "You created an agent" }
      - element_exists: { id: "conversation-toolbar-button" }
    criteria: agent_created_via_builder
    note: >
      Tapping Make commits the draft agent; the builder names it from the prompt
      (e.g. "King's Tutor") and shows "You created an agent" + the agent card. The
      agent joins the conversation as a verified (attested) member.

  - id: agent_provisions_template
    name: "Agent finishes provisioning and is assigned a templateId"
    actions:
      - wait_for_element: { label_not_contains: "Setting", timeout: 90, optional: true }
        note: >
          The agent thinks ("Setting your <role> identity") while the backend
          assigns the templateId. This requires the local backend generator +
          credits; on a stack where the account isn't provisioned the agent shows
          "lost power" / "Upgrade" and never gets a templateId.
      - screenshot: {}
    verify:
      - element_not_exists: { label_contains: "lost power" }
    criteria: agent_template_provisioned
    note: >
      Until the templateId is assigned, the agent is verified but template-less
      (agentTemplateId == nil). It should still appear in the browse list and picker
      as an existing inbox, but starting/adding it will not spawn a fresh template
      instance. A "lost power" / "Upgrade" badge here means the local backend
      account/provisioning path failed; fix the local account seed before treating
      template-backed spawning/publish-share behavior as an app regression.
  - id: agent_appears_in_contacts
    name: "The built template-backed agent appears in the Contacts list"
    actions:
      - tap: { id: "close-committed-agent-conversation", optional: true }
      - tap: { id: "app-indicator-pill" }
      - wait_for_element: { id: "contacts-row", timeout: 10 }
      - tap: { id: "contacts-row" }
      - wait_for_element: { label_contains: "Contacts", timeout: 10 }
      - screenshot: {}
    verify:
      - element_exists: { id: "contact-row-" }
      - element_exists: { label_contains: "Agent" }
    criteria: agent_visible_in_contacts
    note: >
      The built agent renders as a contact row with its builder-assigned name, its
      emoji avatar, and an "Agent" RoleLabelPill (ContactRowView shows the pill for
      isVerifiedAgent). Requires the templateId from the previous step.

  - id: open_agent_contact_card
    name: "Agent contact card shows Agent pill, valid attestation, Share + Chat"
    actions:
      - tap: { id: "contact-row-" }
      - wait_for_element: { id: "contact-detail-chat", timeout: 10 }
      - screenshot: {}
    verify:
      - element_exists: { id: "contact-detail-chat" }
      - element_exists: { id: "contact-detail-share-agent" }
      - element_exists: { id: "contact-detail-get-skills" }
      - element_exists: { label_contains: "Agent" }
      - element_exists: { label_contains: "Valid - convos" }
    criteria: agent_card_shows_agent_affordances
    note: >
      contact-detail-share-agent renders only for a template-backed agent with a live
      session. contact-detail-debug-attestation reads "Attestation, Valid - convos",
      confirming the pinned AGENT_DEBUG_JWKS verified the built agent.

  - id: chat_shows_agent_info_sheet
    name: "Chat button presents the New-chat-new-context confirmation"
    actions:
      - tap: { id: "contact-detail-chat" }
      - wait_for_element: { label_contains: "new context", timeout: 10 }
      - screenshot: {}
    verify:
      - element_exists: { label_contains: "new context" }
      - element_exists: { label: "Got it" }
    criteria: agent_info_sheet_presented
    note: >
      handleChatWithAgentTemplate presents OneAgentManyConvosInfoSheet; match on the
      unique title "New chat, new context" + the "Got it" button (no stable
      accessibility id surfaces through the shared FeatureInfoSheet button style).

  - id: confirm_agent_info_proceeds
    name: "Got it proceeds to a new conversation seeded with the agent"
    actions:
      - tap: { label: "Got it" }
      - wait_for_element: { id: "message-text-field", timeout: 20 }
      - screenshot: {}
    verify:
      - element_exists: { id: "message-text-field" }
    criteria: agent_info_confirm_proceeds
    note: >
      Tapping Got it dismisses the sheet and creates a new conversation with the same
      agent template spawned in (a fresh instance) - the dedup pipeline keys these to
      one contact by templateId. Landing on a composer confirms the flow proceeded.

teardown:
  - action: note
    args:
      text: >
        Leave the built agent + its conversations in place for tests 37 / 37b, which
        build on the same agent-builder state.

criteria:
  agent_created_via_builder:
    description: "The agent-builder creates an agent from a prompt ('You created an agent') and lands on the agent conversation"
  agent_template_provisioned:
    description: "The agent finishes provisioning (no 'lost power'), i.e. the backend assigned its templateId"
  agent_visible_in_contacts:
    description: "The verified template-backed agent appears as a contact row with an 'Agent' pill"
  agent_card_shows_agent_affordances:
    description: "The agent contact card shows the Agent role pill, a valid convos attestation, the Share-agent icon, and the Chat button"
  agent_info_sheet_presented:
    description: "Tapping Chat on the agent card presents the 'New chat, new context' sheet"
  agent_info_confirm_proceeds:
    description: "Tapping 'Got it' dismisses the sheet and lands on a new conversation composer"
