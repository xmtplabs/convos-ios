id: "13"
name: "Legacy-Wipe on Upgrade to Single-Inbox Build"
description: >
  Verify the single-inbox refactor's one-way legacy wipe: upgrading from
  a main-branch build with per-conversation identities into the single-inbox
  branch must clear prior GRDB data, prior XMTP databases, and prior
  per-conversation keychain identities, then boot into a fresh single-inbox
  state without crashing. The prior backwards-compatible migration story is
  gone (see docs/plans/single-inbox-identity-refactor.md).
tags: [migration, database, legacy-wipe, special, expected-partial]
depends_on: ["01"]
estimated_duration_s: 600
expected_partial_until: "C11"

prerequisites:
  app_running: false
  cli_initialized: true
  requires_separate_simulator: true

state:
  migration_udid: null
  worktree_path: "/tmp/convos-migration-main"

setup:
  - action: create_migration_simulator
    note: >
      Clone a base iPhone simulator named "<current-sim>-migration".
      Boot it and record the UDID. Build and install the main branch
      version (per-conversation identity) from a temporary git worktree.

steps:
  - id: build_main
    name: "Main branch builds and installs successfully"
    actions:
      - create_worktree: { path: "/tmp/convos-migration-main", branch: "main" }
      - xcodebuild:
          project: "/tmp/convos-migration-main/Convos.xcodeproj"
          scheme: "Convos (Dev)"
          destination: "$migration_udid"
      - install_app: { udid: "$migration_udid" }
      - launch_app: { udid: "$migration_udid" }
    criteria: main_builds

  - id: populate_legacy_data
    name: "Populate per-conversation identities on the main branch"
    actions:
      - cli_create_and_join_conversations:
          simulator: "$migration_udid"
          conversations:
            - { name: "Legacy Alpha", messages: 3 }
            - { name: "Legacy Beta", messages: 2 }
            - { name: "Legacy Gamma", messages: 2 }
      - screenshot: { udid: "$migration_udid" }
      - terminate_app: { udid: "$migration_udid" }
    criteria: legacy_data_populated

  - id: install_single_inbox
    name: "Single-inbox branch installs on top of main"
    actions:
      - xcodebuild:
          project: "Convos.xcodeproj"
          scheme: "Convos (Dev)"
          destination: "$migration_udid"
      - install_app: { udid: "$migration_udid" }
      - launch_app: { udid: "$migration_udid" }
      - wait_for_launch_stabilized: { udid: "$migration_udid", timeout: 30 }
    criteria: single_inbox_installs

  - id: verify_wipe
    name: "Legacy data is wiped on first single-inbox launch"
    actions:
      - screenshot: { udid: "$migration_udid" }
      - find_elements: { pattern: "conversation-list-item", udid: "$migration_udid" }
      - inspect_logs: { pattern: "LegacyDataWipe: detected legacy data" }
      - inspect_logs: { pattern: "LegacyDataWipe: removed" }
    verify:
      - no_elements_matching: { pattern: "conversation-list-item" }
      - no_crash_on_launch: true
      - log_contains: "LegacyDataWipe: detected legacy data"
    criteria: legacy_wipe_executed

  - id: verify_single_identity
    name: "Fresh single-inbox identity created silently (C3 gate)"
    blocked_until_checkpoint: "C3"
    actions:
      - wait_for_element: { id: "compose-button", timeout: 15, udid: "$migration_udid" }
    verify:
      - no_onboarding_prompt: true
      - single_identity_in_keychain: true
    criteria: single_identity_created

  - id: post_wipe_functional
    name: "Join and message flow works on the single inbox (C10/C11 gate)"
    blocked_until_checkpoint: "C10"
    actions:
      - cli_create_and_join:
          name: "Post-Wipe Test"
          simulator: "$migration_udid"
      - cli_send_text:
          conversation: "$conversation_id"
          text: "Post-wipe message"
      - wait_for_element: { label_contains: "Post-wipe message", timeout: 15 }
    verify:
      - element_exists: { label_contains: "Post-wipe message" }
    criteria: post_wipe_functional

  - id: wipe_idempotence
    name: "Wipe does not re-run on second launch"
    actions:
      - terminate_app: { udid: "$migration_udid" }
      - launch_app: { udid: "$migration_udid" }
      - inspect_logs: { since_launch: true, pattern: "LegacyDataWipe: detected legacy data" }
    verify:
      - log_not_contains: "LegacyDataWipe: detected legacy data"
    criteria: wipe_idempotent

teardown:
  - action: delete_simulator
    args: { udid: "$migration_udid" }
  - action: remove_worktree
    args: { path: "/tmp/convos-migration-main" }

criteria:
  main_builds:
    description: "Main branch app builds and installs on the migration simulator"
  legacy_data_populated:
    description: "Per-conversation identities and conversations exist on the main version"
  single_inbox_installs:
    description: "Single-inbox branch installs and launches on top of main"
  legacy_wipe_executed:
    description: "Legacy conversations are gone and the wipe log lines are present"
    checkpoint: "C2"
  single_identity_created:
    description: "Exactly one identity is present after the wipe; no onboarding prompts"
    checkpoint: "C3"
  post_wipe_functional:
    description: "A new conversation can be joined and messaged on the single inbox"
    checkpoint: "C10-C11"
  wipe_idempotent:
    description: "Legacy-wipe only executes once; subsequent launches skip it"
    checkpoint: "C2"
