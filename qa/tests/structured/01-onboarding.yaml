id: "01"
name: "Fresh Onboarding Flow"
description: >
  Verify that a first-time user is offered the first-launch "Hello / My name
  is" profile setup sheet, can complete it, and then creates a conversation
  without being re-prompted for a profile.
tags: [onboarding, core, destructive]
depends_on: []
estimated_duration_s: 120

prerequisites:
  app_installed: true
  simulator_erased: true

setup:
  - action: erase_simulator
    note: "Ensures clean state — no prior app data"
  - action: install_app
  - action: disable_animations
  - action: seed_app_check_token
    note: >
      Erasing the simulator wipes the cached App Check attestation; without
      re-seeding the registered debug token into the app container prefs the
      first conversation create 403s (exchangeDebugToken PERMISSION_DENIED)
      with a "Something went wrong" sheet. Seed the token before first launch
      and verify the app log shows no appCheck errors before starting steps.
  - action: launch_app

steps:
  - id: fresh_launch
    name: "App launches to the home shell"
    actions:
      - wait_for_element: { id: "compose-button", timeout: 15 }
    verify:
      - element_exists: { id: "compose-button" }
    criteria: app_launches_fresh
    note: >
      The dedicated empty-state screen (start-convo-button / join-convo-button)
      was removed from the app; a fresh install lands directly on the home
      shell with the compose button available.

  - id: first_launch_profile_sheet
    name: "First-launch profile setup sheet appears"
    actions:
      - wait_for_element: { id: "profile-setup-name-field", timeout: 20 }
    verify:
      - element_exists: { id: "profile-setup-name-field" }
      - element_exists: { id: "profile-setup-terms-toggle" }
      - element_exists: { id: "profile-setup-save-button" }
    criteria: first_launch_sheet_appears
    note: >
      The "Hello / My name is" sheet self-presents over the Chats tab once the
      inbox is ready (it waits for the global profile load, so allow up to
      20s on a cold fresh install). It presents on every launch while the
      user has no name or photo set — the shown-once latch was removed — and
      it only shows when no other device's identity exists in the
      iCloud-synced keychain backup; an erased simulator satisfies that. If
      the found-device pairing sheet appears instead, the simulator was not
      fully erased. The CTA reads "Come in" and is disabled until a name is
      entered (the terms toggle defaults on). While the CTA is disabled the
      sheet cannot be swiped away (interactive dismissal is blocked).

  - id: first_launch_profile_setup
    name: "Set name via the first-launch sheet"
    actions:
      - type_in_field: { id: "profile-setup-name-field", text: "QA Tester", clear_first: true }
      - tap: { id: "profile-setup-save-button" }
      - wait_for_element: { id: "compose-button", timeout: 10 }
    verify:
      - element_not_exists: { id: "profile-setup-name-field" }
    criteria: profile_can_be_set
    note: >
      A keyboard tutorial overlay may appear on fresh simulators — dismiss it
      by tapping "Continue" before typing. Empty state: the name field
      placeholder is "Name", the avatar shows person.crop.circle.fill (it
      becomes a monogram once a name is typed, or the photo once one is
      picked), the terms toggle is ON by default, and the CTA is
      disabled/gray until a name is entered. Turning the toggle off disables
      the CTA again. Saving publishes the global profile and dismisses the
      sheet. Tapping the avatar, photo, or camera buttons
      (profile-setup-avatar / profile-setup-photo-button /
      profile-setup-camera-button) is covered by test 19. Note for
      automation: idb taps don't register on the SwiftUI toggle — use a
      short swipe across the knob if the toggle needs flipping.

  - id: create_conversation
    name: "Create a new conversation"
    actions:
      - tap: { id: "compose-button" }
      - wait_for_element: { id: "invite-qr-code", timeout: 15 }
    verify:
      - element_exists: { id: "invite-qr-code" }
      - element_exists: { id: "message-text-field" }
    criteria: compose_opens_conversation

  - id: no_profile_reprompt
    name: "No in-conversation profile prompt"
    actions:
      - find_elements: { pattern: "setup-profile-button" }
    verify:
      - element_not_exists: { id: "setup-profile-button" }
    criteria: no_profile_reprompt
    note: >
      The profile was set on the first-launch sheet, so the legacy
      in-conversation "Add your name and pic" prompt must not appear. (That
      flow still exists as a fallback for users who enable the CTA but swipe
      the sheet away without saving; the sheet re-presents on the next
      launch while the profile stays unset — see 01b in the markdown doc.)

  - id: notification_permission
    name: "Notification permission step shown"
    actions:
      - wait_for_element: { id: "notification-permission-button", timeout: 15 }
      - tap: { id: "notification-permission-button" }
      - wait_for_element: { label: "Allow", timeout: 5 }
    verify:
      - any_element_matches: { patterns: ["Allow", "Don't Allow"] }
    criteria: notification_step_shown
    note: "App shows custom prompt (notification-permission-button) first, then system dialog"

  - id: dismiss_notification
    name: "Dismiss system notification dialog"
    actions:
      - tap: { label: "Allow", optional: true }
      - tap: { label: "Don't Allow", optional: true }
      - wait_for_element: { id: "message-text-field", timeout: 10 }

  - id: conversation_usable
    name: "Onboarding completes and conversation is usable"
    actions:
      - find_elements: { id: "message-text-field" }
    verify:
      - element_exists: { id: "message-text-field" }
      - element_enabled: { id: "message-text-field" }
    criteria: onboarding_completes

  - id: verify_list
    name: "Conversation appears in list"
    actions:
      - tap: { id: "close-new-conversation", optional: true }
      - tap: { id: "BackButton", optional: true }
      - wait_for_element: { id: "compose-button", timeout: 10 }
      - find_elements: { pattern: "conversation-list-item" }
    verify:
      - element_count_gte: { pattern: "conversation-list-item", min: 1 }
    criteria: conversation_in_list
    save:
      conversation_id: "extract from conversation-list-item-* identifier suffix"

teardown: []

criteria:
  app_launches_fresh:
    description: "App launches to the home shell after simulator erase (compose button available)"
  first_launch_sheet_appears:
    description: "First-launch 'Hello / My name is' profile sheet self-presents with name field, terms toggle, and Come in button"
  profile_can_be_set:
    description: "Profile can be set via the first-launch sheet and the sheet dismisses on Come in"
  compose_opens_conversation:
    description: "Compose button opens a new conversation flow"
  no_profile_reprompt:
    description: "The in-conversation profile setup prompt does not appear after completing the first-launch sheet"
  notification_step_shown:
    description: "Notification permission step is shown"
  onboarding_completes:
    description: "Onboarding completes and the conversation is usable"
  conversation_in_list:
    description: "Conversation appears in the conversations list"
