id: "20"
name: "Send and Receive Photos"
description: >
  Verify end-to-end photo messaging: sending from app, receiving from CLI,
  the photo context menu, and the first-time "Pics are personal" education
  sheet (shown on first send). Incoming photos render immediately, unblurred.
tags: [messaging, photos, core]
depends_on: ["02"]
estimated_duration_s: 300

prerequisites:
  app_running: true
  cli_initialized: true
  shared_conversation: true
  screen: conversation_detail
  simulator_has_photos: true

state:
  conversation_id: null

setup:
  - action: ensure_shared_conversation
    save:
      conversation_id: run_state.shared_conversation_id
  - action: add_test_photos_to_simulator
    note: >
      curl -sL "https://picsum.photos/400/300" -o /tmp/test-photo.jpg
      curl -sL "https://picsum.photos/200/200" -o /tmp/cli-test-photo.jpg
      xcrun simctl addmedia $UDID /tmp/test-photo.jpg

steps:
  - id: send_photo
    name: "Send photo from app"
    actions:
      - tap: { id: "photo-picker-button" }
      - wait_for_element: { label: "Photos", timeout: 10 }
      - tap_first_photo: {}
      - dismiss_education_sheet: { button: "Got it" }
      - wait_for_element: { id: "send-message-button", timeout: 5 }
      - tap: { id: "send-message-button" }
      - wait_for_element: { label: "Sent", timeout: 15 }
    verify:
      - element_exists: { label: "Sent" }
    criteria: photo_sent
    note: >
      Photo picker button: id="photo-picker-button", label="Photo library".
      First-time send triggers "Pics are personal" education sheet:
      "Real life is off the record. Pics are encrypted on send and deleted
      from temp storage after delivery. Convos never sees or saves to your
      Camera Roll. Image metadata is never shared." Dismiss with "Got it".
      Photo thumbnail appears in composer with X cancel button.
      Known BUG: Sender sees "Failed to load" for their own sent photo
      instead of the actual image.

  - id: receive_photo
    name: "Receive photo from CLI (renders unblurred)"
    actions:
      - cli_send_attachment:
          conversation: "$conversation_id"
          path: "/tmp/cli-test-photo.jpg"
      - wait_for_element: { label_contains: "Photo message", timeout: 15 }
      - screenshot: {}
    verify:
      - element_exists: { label_contains: "Photo message" }
      - element_not_exists: { label_contains: "Tap pic to reveal" }
      - visual_check: "Incoming photo renders immediately as a full-width image, sharp and unblurred, with no reveal overlay"
    criteria: photo_received
    note: >
      Incoming photos render immediately as a full-width image, unblurred.
      There is no blur, no "Tap pic to reveal" overlay, and no tap-to-reveal
      gesture. MessagesGroupItemView sets the "Photo message" accessibility
      label on the photo bubble.

  - id: photo_context_menu
    name: "Photo context menu has no Blur/Reveal action"
    actions:
      - long_press: { label_contains: "Photo message", duration: 0.5 }
      - screenshot: {}
    verify:
      - element_exists: { label: "Reply" }
      - element_exists: { label: "Save" }
      - element_not_exists: { label: "Blur" }
      - element_not_exists: { label: "Reveal" }
    criteria: photo_context_menu_no_reveal
    note: >
      The photo context menu shows the standard actions (Reply, Save, Share)
      for both incoming and own/sent photos. There is no per-message Blur or
      Reveal action.
    actions_after:
      - key: { code: 41 }

teardown: []

criteria:
  photo_sent:
    description: "Photo can be selected and sent from the app"
  photo_received:
    description: "Incoming photo renders immediately as a full-width image, unblurred, with no reveal overlay"
  photo_context_menu_no_reveal:
    description: "Photo context menu shows Reply and Save but no Blur or Reveal action"
