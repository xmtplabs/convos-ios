id: "37b"
name: "Agent Contact Consent And Block"
description: >
  Destructive follow-up validating the consent-driven feed visibility this PR
  introduced, using the in-app agent-builder agent (no CLI, no invites). Blocking a
  template-backed agent contact demotes its conversation consent to .denied and
  hides it from the feed; unblocking does NOT promote .denied back to .allowed, so
  the conversation stays hidden - the same invariant that keeps a user-deleted
  conversation from being resurrected. Guards
  ConversationConsentReconciler.fetchMismatchedTargets. The reconciler logic is also
  covered directly by ConversationConsentReconcilerTests; this confirms the
  end-to-end UI wiring.
tags: [agents, contacts, consent, block, destructive, local-stack, agent-builder]
depends_on: ["37"]
estimated_duration_s: 300

prerequisites:
  app_running: true
  local_stack_running: true
  agent_jwks_pinned: true
  scheme: "Convos (Local)"
  bundle_id: org.convos.ios-local
  screen: home
  backend_agent_provisioning_working: true

setup:
  - action: note
    args:
      text: >
        Reuses an agent-builder agent from test 36/37 (e.g. "King's Tutor") that is a
        visible contact. Destructive (block/unblock/consent), so it runs last in the
        Agents-as-Contacts sequence. The agent's conversation is named after the
        agent, so that title is what appears/disappears from the home feed.

steps:
  - id: confirm_agent_conversation_in_feed
    name: "The agent's conversation is visible in the home feed"
    actions:
      - find_elements: { pattern: "conversation-list-item-" }
      - screenshot: {}
    verify:
      - element_count_gte: { pattern: "conversation-list-item-", min: 1 }
    criteria: agent_conversation_visible_before_block
    note: >
      Baseline: the agent's conversation (consent .allowed) shows in the home
      conversation list before the block.

  - id: block_agent_demotes_consent
    name: "Block the agent from its contact card; the card flips to Unblock"
    actions:
      - tap: { id: "app-indicator-pill" }
      - wait_for_element: { id: "contacts-row", timeout: 10 }
      - tap: { id: "contacts-row" }
      - wait_for_element: { label_contains: "Contacts", timeout: 10 }
      - tap: { id: "contact-row-" }
      - wait_for_element: { id: "contact-detail-block", timeout: 10 }
      - tap: { id: "contact-detail-block" }
      - wait_for_element: { label: "Block", timeout: 10 }
      - tap: { label: "Block" }
      - wait_for_element: { id: "contact-detail-unblock", timeout: 10 }
      - screenshot: {}
    verify:
      - element_exists: { id: "contact-detail-unblock" }
    criteria: block_writes_and_flips_to_unblock
    note: >
      Block writes blockedAt to the canonical DBContact row. The confirmation action
      is labeled "Block"; afterwards the card shows the Unblock affordance. The
      ConversationConsentReconciler then demotes the agent conversation to .denied.

  - id: blocked_conversation_hidden_in_feed
    name: "The blocked agent's conversation disappears from the chat list"
    actions:
      - tap: { id: "BackButton", optional: true }
      - tap: { id: "BackButton", optional: true }
      - wait: { seconds: 3 }
      - find_elements: { pattern: "conversation-list-item-" }
      - screenshot: {}
    verify:
      - visual_check: >
          The agent's conversation (named after the agent) is no longer in the home
          conversation list - it was demoted to .denied and feed visibility is keyed
          on consent. Allow a few seconds for the reconciler to run.
    criteria: blocked_conversation_hidden
    note: >
      fetchMismatchedTargets matches (contact.blockedAt IS NOT NULL AND
      conversation.consent <> .denied) and demotes to .denied.

  - id: blocked_agent_still_in_browse
    name: "The blocked agent stays in the browse list with an Unblock affordance"
    actions:
      - tap: { id: "app-indicator-pill" }
      - wait_for_element: { id: "contacts-row", timeout: 10 }
      - tap: { id: "contacts-row" }
      - wait_for_element: { id: "contact-row-", timeout: 10 }
      - screenshot: {}
    verify:
      - element_exists: { id: "contact-row-" }
    criteria: blocked_agent_in_browse
    note: >
      ContactsRepository returns blocked rows so the browse list can offer an unblock
      affordance (the picker filters them out via isPickable: !isBlocked).

  - id: unblock_does_not_resurrect
    name: "Unblocking does not promote .denied back to .allowed"
    actions:
      - tap: { id: "contact-row-" }
      - wait_for_element: { id: "contact-detail-unblock", timeout: 10 }
      - tap: { id: "contact-detail-unblock" }
      - wait_for_element: { label: "Unblock", timeout: 10 }
      - tap: { label: "Unblock" }
      - wait_for_element: { id: "contact-detail-block", timeout: 10 }
      - tap: { id: "BackButton", optional: true }
      - tap: { id: "BackButton", optional: true }
      - wait: { seconds: 3 }
      - find_elements: { pattern: "conversation-list-item-" }
      - screenshot: {}
    verify:
      - visual_check: >
          The agent's conversation is STILL absent from the home feed after unblock.
          fetchMismatchedTargets only promotes .unknown -> .allowed, never .denied, so
          the demoted conversation stays hidden even though the contact is unblocked.
    criteria: denied_not_resurrected_on_unblock
    note: >
      This is the blocker-1 regression - the same code path that prevents a
      user-deleted conversation (delete writes .denied) from being resurrected by the
      non-blocked-contact promotion rule. Authoritative coverage:
      ConversationConsentReconcilerTests.testPromotesUnknownButNotDeniedFromNonBlockedContact.

teardown:
  - action: note
    args:
      text: >
        Run before test 18 (delete-all-data). The stale-stranger GC time-based
        branches are not UI-exercisable in one session and are covered by
        StaleStrangerGCTests in the ConvosCore suite.

criteria:
  agent_conversation_visible_before_block:
    description: "Baseline: the agent's conversation is visible in the home feed before blocking"
  block_writes_and_flips_to_unblock:
    description: "Confirming Block on the agent card writes the block and the card shows the Unblock affordance"
  blocked_conversation_hidden:
    description: "After blocking, the agent's conversation is demoted to .denied and disappears from the chat list"
  blocked_agent_in_browse:
    description: "The blocked agent still appears in the Contacts browse list (so it can be unblocked)"
  denied_not_resurrected_on_unblock:
    description: "Unblocking does NOT promote the .denied conversation back to .allowed; it stays hidden from the feed"
