id: "14"
name: "Quickname Flow"
description: >
  Verify that quickname auto-applies to new conversations, can be edited
  per-conversation via quick edit, and can be overridden from My Info.
tags: [profile, quickname, core]
depends_on: ["01"]
estimated_duration_s: 240

prerequisites:
  app_running: true
  cli_initialized: true
  screen: conversations_list
  quickname_set: true

state:
  conversation_id: null
  quickname: null

setup:
  - action: verify_quickname_set
    note: >
      The app must have a quickname set from onboarding or a previous session.
      If not, create a conversation and complete the quickname flow first.

steps:
  - id: quickname_auto_applied
    name: "Quickname pill appears and auto-applies"
    actions:
      - cli_create_conversation:
          name: "Quickname Test"
          profile_name: "CLI Bot"
      - cli_generate_invite:
          conversation: "$conversation_id"
      - sim_open_url: { url: "$invite_url" }
      - wait_for_element: { id: "message-text-field", timeout: 15 }
      - cli_process_joins_background:
          conversation: "$conversation_id"
      - tap: { label_contains: "Tap to chat", retries: 30 }
    verify:
      - element_exists: { label_contains: "Chat as" }
    criteria: quickname_pill_appears
    save:
      conversation_id: "from CLI create response"
    note: >
      The quickname pill appears as soon as the conversation becomes ready
      and auto-dismisses after ~8 seconds. Start process-join-requests in
      background and immediately start tapping the pill.

  - id: quickname_on_messages
    name: "Messages show quickname display name"
    actions:
      - type_in_field: { id: "message-text-field", text: "Hello with quickname" }
      - tap: { id: "send-message-button" }
      - wait_for_element: { label_contains: "Hello with quickname", timeout: 10 }
    verify:
      - element_exists: { label_contains: "Hello with quickname" }
    criteria: quickname_on_messages

  - id: quick_edit_opens
    name: "Quick edit view opens from avatar"
    actions:
      - tap: { id: "profile-avatar-button" }
      - wait_for_element: { id: "quick-edit-display-name-field", timeout: 10 }
    verify:
      - element_exists: { id: "quick-edit-display-name-field" }
      - element_exists: { id: "quick-edit-done-button" }
    criteria: quick_edit_opens

  - id: edit_name_quick_edit
    name: "Display name changed via quick edit"
    actions:
      - type_in_field: { id: "quick-edit-display-name-field", text: "Custom Name", clear_first: true }
      - tap: { id: "quick-edit-done-button" }
      - wait_for_element: { label_contains: "Chat as Custom Name", timeout: 10 }
    verify:
      - element_exists: { label_contains: "Chat as Custom Name" }
    criteria: name_changed_quick_edit

  - id: custom_name_on_messages
    name: "Changed name appears on sent messages"
    actions:
      - type_in_field: { id: "message-text-field", text: "Message with custom name" }
      - tap: { id: "send-message-button" }
      - wait_for_element: { label_contains: "Custom Name", timeout: 10 }
    verify:
      - element_exists: { label_contains: "Custom Name" }
    criteria: custom_name_visible

  - id: my_info_override
    name: "Quickname can be re-applied from My Info"
    actions:
      - tap: { id: "profile-avatar-button" }
      - wait_for_element: { id: "quick-edit-display-name-field", timeout: 10 }
      - tap: { id: "quick-edit-lanyard-button" }
      - wait_for_element: { label_contains: "Use", timeout: 10 }
      - tap: { label: "Use" }
      - wait_for_element: { label_contains: "Chat as", timeout: 10 }
    verify:
      - element_exists: { label_contains: "Chat as" }
    criteria: quickname_override_works
    note: >
      The lanyard button opens My Info view. Find the "Use" button
      next to the quickname section and tap it to re-apply.

teardown:
  - action: explode_conversation
    args: { id: "$conversation_id" }
    optional: true

criteria:
  quickname_pill_appears:
    description: "Quickname pill appears above the composer when entering a new conversation"
  quickname_on_messages:
    description: "Messages sent with quickname show the correct display name"
  quick_edit_opens:
    description: "Quick edit view opens when tapping the avatar"
  name_changed_quick_edit:
    description: "Display name can be changed via the quick edit view"
  custom_name_visible:
    description: "Changed display name appears on sent messages"
  quickname_override_works:
    description: "'Use' button in My Info re-applies the quickname to the conversation"
