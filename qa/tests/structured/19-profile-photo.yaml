id: "19"
name: "Profile and Group Photos"
description: >
  Verify that profile photos and group photos can be set, display
  correctly, and sync to other participants.
tags: [profile, photos]
depends_on: ["02"]
estimated_duration_s: 180

prerequisites:
  app_running: true
  cli_initialized: true
  shared_conversation: true
  screen: conversation_detail

state:
  conversation_id: null

setup:
  - action: add_photo_to_simulator
    note: >
      curl -sL "https://picsum.photos/850/650" -o /tmp/test-photo.jpg
      xcrun simctl addmedia $UDID /tmp/test-photo.jpg

steps:
  - id: set_profile_photo
    name: "Profile photo can be set from the app"
    actions:
      - tap: { id: "conversation-toolbar-button" }
      - wait_for_element: { id: "profile-avatar-button", timeout: 10 }
      - tap: { id: "profile-avatar-button" }
      - wait_for_element: { id: "photo-picker-button", timeout: 10 }
      - tap: { id: "photo-picker-button" }
      - wait_for_element: { label: "Photos", timeout: 10 }
    verify:
      - element_exists: { label: "Photos" }
    criteria: profile_photo_set
    note: >
      The photo picker flow varies — may be a system picker or custom UI.
      Tap a photo thumbnail to select, then save.

  - id: verify_profile_photo_cli
    name: "Profile photo syncs to CLI"
    actions:
      - cli_check_profiles: { conversation: "$conversation_id" }
    verify:
      - cli_output_contains: "imageUrl"
    criteria: profile_photo_syncs

  - id: set_group_photo
    name: "Group photo can be set"
    actions:
      - tap: { id: "conversation-toolbar-button" }
      - wait_for_element: { id: "group-avatar-button", timeout: 10 }
      - tap: { id: "group-avatar-button" }
      - wait_for_element: { id: "photo-picker-button", timeout: 10 }
      - tap: { id: "photo-picker-button" }
      - wait_for_element: { label: "Photos", timeout: 10 }
    verify:
      - element_exists: { label: "Photos" }
    criteria: group_photo_set

  - id: verify_group_photo_list
    name: "Group photo displays in conversations list"
    actions:
      - navigate_back: {}
      - navigate_back: {}
      - wait_for_element: { id: "compose-button", timeout: 5 }
    verify:
      - element_exists: { id: "conversation-list-item-$conversation_id" }
    criteria: group_photo_in_list

teardown: []

criteria:
  profile_photo_set:
    description: "Profile photo can be set from the app"
  profile_photo_syncs:
    description: "Profile photo syncs to other participants (visible via CLI)"
  group_photo_set:
    description: "Group photo can be set from conversation info"
  group_photo_in_list:
    description: "Group photo displays in the conversations list"
