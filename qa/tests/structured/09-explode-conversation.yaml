id: "09"
name: "Explode Conversation"
description: >
  Verify that exploding a conversation removes it for all participants
  using the single-inbox remove-all-then-leave flow. The creator broadcasts
  ExplodeSettings, removes every other member from the MLS group, then
  leaves the group themselves. Receivers drop the conversation locally on
  whichever signal arrives first. NO keychain or XMTP database deletion —
  the singleton identity persists across the explode (see ADR 004 C9
  amendment + docs/plans/single-inbox-identity-refactor.md).
tags: [conversations, explode, destructive, single-inbox]
depends_on: ["12"]
estimated_duration_s: 90

prerequisites:
  app_running: true
  cli_initialized: true
  screen: conversations_list

state:
  conversation_id: null
  cli_identity_id: null

setup:
  - action: create_conversation_from_app
    note: >
      Create a new conversation from the app (so app is super admin).
      Have CLI join via invite. Exchange a few messages.
    save:
      conversation_id: "from CLI join response"
      cli_identity_id: "from CLI join response"

steps:
  - id: open_conversation_info
    name: "Open conversation info"
    actions:
      - tap: { id: "conversation-list-item-$conversation_id" }
      - wait_for_element: { id: "message-text-field", timeout: 10 }
      - tap: { id: "conversation-toolbar-button" }
      - wait_for_element: { label_contains: "Explode", timeout: 10 }
    verify:
      - element_exists: { label_contains: "Explode" }
    criteria: explode_option_visible

  - id: trigger_explode
    name: "Explode with tap-and-hold confirmation"
    actions:
      - tap: { id: "context-menu-explode" }
      - wait_for_element: { label_contains: "Explode Now", timeout: 5 }
      - long_press: { label_contains: "Explode Now, Tap and hold", duration: 3 }
      - wait_for_element: { id: "compose-button", timeout: 15 }
    verify:
      - element_not_exists: { id: "conversation-list-item-$conversation_id" }
    criteria: conversation_removed
    expect_events:
      - "conversation.exploded"
    note: >
      Context menu Explode opens a schedule picker with options like
      "60 seconds", "1 hour", "24 hours", and "Explode Now (Tap and hold)".
      The "Explode Now" button requires a 3-second long press to confirm.
      Use describe_all to find exact button coordinates. After explosion,
      a "💥 <Name> 💥 — A convo exploded" notification appears briefly.

  - id: verify_cli
    name: "Conversation no longer accessible via CLI"
    actions:
      - cli_send_text:
          conversation: "$conversation_id"
          text: "Should fail"
          expect_failure: true
    verify:
      - cli_output_contains_error: true
    criteria: cli_cannot_access
    note: >
      Sending a message to an exploded conversation should fail.
      The CLI may report the conversation as not found or that the
      sender is not a member (the creator removed the CLI member
      before leaving the group).

  - id: verify_creator_left_group
    name: "Creator left MLS group on the network"
    actions:
      - inspect_logs: { pattern: "Creator left exploded group" }
      - cli_list_members:
          conversation: "$conversation_id"
          expect_failure: true
    verify:
      - log_contains: "Creator left exploded group"
      - cli_output_contains_error_or_empty: true
    criteria: creator_left
    note: >
      Confirms `group.leaveGroup()` ran successfully on the creator
      side (the new C9 step). On degraded paths (network error during
      leave) the log will instead show
      'Failed leaving group after explosion ... denied consent' —
      that's a known fallback to the legacy
      `updateConsentState(.denied)` behavior and is acceptable but
      should be flagged for follow-up.

  - id: verify_no_account_damage
    name: "Other conversations and profile unaffected (no keychain destruction)"
    actions:
      - tap: { id: "compose-button" }
      - wait_for_element: { id: "invite-qr-code", timeout: 15 }
      - navigate_back: {}
    verify:
      - no_crash_on_launch: true
      - element_exists: { id: "compose-button" }
    criteria: no_account_damage
    note: >
      Single-inbox explode no longer destroys the keychain identity.
      Verify the user can still create a new conversation, has their
      profile, and the app behaves normally — proves the
      .leftConversationNotification observer didn't tear down the
      account when it landed in C4a (and that this commit doesn't
      reintroduce that behavior).

teardown: []

criteria:
  explode_option_visible:
    description: "'Explode now' option is visible in conversation info for super admins"
  conversation_removed:
    description: "Conversation is removed from the app's conversations list after exploding"
  cli_cannot_access:
    description: "Conversation is no longer accessible via CLI; CLI was removed from the group before creator left"
  creator_left:
    description: "Device logs show 'Creator left exploded group' (or fallback denied-consent message); CLI confirms creator is no longer a member"
    checkpoint: "C9"
  no_account_damage:
    description: "Other conversations remain accessible and the user's profile is unchanged after explode (proves no keychain destruction)"
    checkpoint: "C9"
