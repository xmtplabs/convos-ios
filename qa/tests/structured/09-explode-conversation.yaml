id: "09"
name: "Explode Conversation"
description: >
  Verify that exploding a conversation removes it for all participants
  and destroys the conversation data.
tags: [conversations, explode, destructive]
depends_on: ["12"]
estimated_duration_s: 90

prerequisites:
  app_running: true
  cli_initialized: true
  screen: conversations_list

state:
  conversation_id: null
  cli_identity_id: null

setup:
  - action: create_conversation_from_app
    note: >
      Create a new conversation from the app (so app is super admin).
      Have CLI join via invite. Exchange a few messages.
    save:
      conversation_id: "from CLI join response"
      cli_identity_id: "from CLI join response"

steps:
  - id: open_conversation_info
    name: "Open conversation info"
    actions:
      - tap: { id: "conversation-list-item-$conversation_id" }
      - wait_for_element: { id: "message-text-field", timeout: 10 }
      - tap: { id: "conversation-toolbar-button" }
      - wait_for_element: { label_contains: "Explode", timeout: 10 }
    verify:
      - element_exists: { label_contains: "Explode" }
    criteria: explode_option_visible

  - id: trigger_explode
    name: "Explode with tap-and-hold confirmation"
    actions:
      - tap: { id: "context-menu-explode" }
      - wait_for_element: { label_contains: "Explode Now", timeout: 5 }
      - long_press: { label_contains: "Explode Now, Tap and hold", duration: 3 }
      - wait_for_element: { id: "compose-button", timeout: 15 }
    verify:
      - element_not_exists: { id: "conversation-list-item-$conversation_id" }
    criteria: conversation_removed
    expect_events:
      - "conversation.exploded"
    note: >
      Context menu Explode opens a schedule picker with options like
      "60 seconds", "1 hour", "24 hours", and "Explode Now (Tap and hold)".
      The "Explode Now" button requires a 3-second long press to confirm.
      Use describe_all to find exact button coordinates. After explosion,
      a "💥 <Name> 💥 — A convo exploded" notification appears briefly.

  - id: verify_cli
    name: "Conversation no longer accessible via CLI"
    actions:
      - cli_send_text:
          conversation: "$conversation_id"
          text: "Should fail"
          expect_failure: true
    verify:
      - cli_output_contains_error: true
    criteria: cli_cannot_access
    note: >
      Sending a message to an exploded conversation should fail.
      The CLI may report the conversation as not found or destroyed.

teardown: []

criteria:
  explode_option_visible:
    description: "'Explode now' option is visible in conversation info for super admins"
  conversation_removed:
    description: "Conversation is removed from the app's conversations list after exploding"
  cli_cannot_access:
    description: "Conversation is no longer accessible via CLI"
